schema_version: 1

context:
  version: "1.0.1"

package:
  name: eventcv
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/e/eventcv/eventcv-${{ version }}.tar.gz
  sha256: 71aac7cacfbff78df2b814aec12ab8a8a1ab9b82b115d0964869dc977d485f69
  patches:
    - relax-numpy-pin.patch

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output ${{ SRC_DIR }}/THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config
  host:
    - python
    - pip
    - maturin >=1.8,<2
    - cmake >=3.18
  run:
    - python
    - numpy >=1.24

tests:
  - python:
      imports:
        - eventcv
      pip_check: true

about:
  summary: Open source event-based computer vision library.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/eventcv/

extra:
  recipe-maintainers:
    - AdamDHines
