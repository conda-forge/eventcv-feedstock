schema_version: 1

context:
  version: "1.0.2"

package:
  name: eventcv
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/e/eventcv/eventcv-${{ version }}.tar.gz
  sha256: c55a8806dec5949ff583c6f8f59ca2edf25b65085eed5f0675c4192911c4183c

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output ${{ SRC_DIR }}/THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.8,<2
  host:
    - python
    - pip
    - maturin >=1.8,<2
    - cmake >=3.18
  run:
    - python
    - numpy >=1.24

tests:
  - python:
      imports:
        - eventcv
      pip_check: true

about:
  summary: Open source event-based computer vision library.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/eventcv/

extra:
  recipe-maintainers:
    - AdamDHines
